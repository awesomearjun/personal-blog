<div class="page">
  <h2 class="seperator">selected work</h2>

  @for (project of projects; track project.name) {
    <article class="page-section project-card" [attr.aria-label]="project.name">
      <div class="project-content">
        <h3>{{ project.name }}</h3>
        <p>{{ project.description }}</p>
        <div class="project-images">
          @if (project.images) {
            @for (image of project.images; track image) {
              <div class="project-image">
                <img [src]="image" [alt]="project.imageAlt ?? project.name" loading="lazy" />
              </div>
            }
          }
        </div>
        <div class="tags">
          @for (tag of project.tags; track tag) {
            <span class="tag">{{ tag }}</span>
          }
        </div>
      </div>
    </article>
  }
</div>
